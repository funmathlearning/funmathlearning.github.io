    <script>
        function filterGames(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('#games a').forEach(a => {
                const alt = a.querySelector('img').alt.toLowerCase();
                a.style.display = alt.includes(q) ? '' : 'none';
            });
        }
    </script>
